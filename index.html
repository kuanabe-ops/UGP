<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra Gear Pro</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="UltraGear">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow: hidden; user-select: none; }
        .animate-in { animation: fadeIn 0.15s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .hide { display: none !important; }
        #view-container { height: 100vh; width: 100%; }
        circle { transition: stroke-dasharray 0.5s ease, stroke-dashoffset 0.5s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .sorting-active { background-color: #f9fafb; border: 2px dashed #e5e7eb !important; }
        .selected-for-move { background-color: #111111 !important; color: white !important; transform: scale(1.02); z-index: 10; }
        
        input[type="date"], input[type="time"] { display: block; text-align: left; -webkit-appearance: none; width: 100%; }

        /* 專門給圖片匯出使用的樣式 */
        #image-render-area {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 400px;
            background: white;
            color: #171717;
        }
    </style>
</head>
<body class="bg-white text-neutral-800">

    <div id="app" class="max-w-md mx-auto h-screen relative border-x border-neutral-50 shadow-sm flex flex-col">
        <div id="view-container" class="flex-1 overflow-hidden"></div>

        <nav id="bottom-nav" class="bg-white/90 backdrop-blur-md border-t border-neutral-100 flex justify-around p-4 pb-8 z-20">
            <button onclick="switchTab('gear')" id="nav-gear" class="flex flex-col items-center gap-1 w-1/3 text-neutral-900 transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                <span class="text-[9px] uppercase tracking-widest font-bold">裝備庫</span>
            </button>
            <button onclick="switchTab('plans')" id="nav-plans" class="flex flex-col items-center gap-1 w-1/3 text-neutral-300 transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <span class="text-[9px] uppercase tracking-widest font-bold">行程規劃</span>
            </button>
            <button onclick="switchTab('trips')" id="nav-trips" class="flex flex-col items-center gap-1 w-1/3 text-neutral-300 transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 7V6a4 4 0 0 1 8 0v1" /><rect x="6" y="7" width="12" height="13" rx="3" /><line x1="9" y1="13" x2="15" y2="13" /></svg>
                <span class="text-[9px] uppercase tracking-widest font-bold">行李清單</span>
            </button>
        </nav>
    </div>

    <div id="image-render-area"></div>

    <input type="file" id="csv-input" accept=".csv" class="hide" onchange="prepareImport(event)">
    
    <div id="modal-delete" class="fixed inset-0 bg-neutral-900/40 backdrop-blur-sm z-[100] flex items-end p-6 hide">
        <div class="bg-white w-full p-6 rounded-3xl animate-in shadow-2xl">
            <h3 class="text-lg font-medium mb-2">確定刪除？</h3>
            <p id="delete-modal-msg" class="text-sm text-neutral-400 font-light mb-8">此動作無法復原。</p>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="closeModal('modal-delete')" class="bg-neutral-100 text-neutral-600 px-4 py-3 rounded-xl font-medium">取消</button>
                <button id="confirm-delete-btn" class="bg-red-50 text-red-500 px-4 py-3 rounded-xl font-medium">刪除</button>
            </div>
        </div>
    </div>

    <div id="modal-import" class="fixed inset-0 bg-neutral-900/40 backdrop-blur-sm z-[120] flex items-end p-6 hide">
        <div class="bg-white w-full p-6 rounded-3xl animate-in shadow-2xl">
            <h3 class="text-lg font-medium mb-6">匯入模式</h3>
            <div class="space-y-3">
                <button onclick="handleImportMode('overwrite')" class="w-full py-4 bg-neutral-900 text-white rounded-xl font-medium">覆蓋舊資料</button>
                <button onclick="handleImportMode('append')" class="w-full py-4 bg-neutral-100 text-neutral-700 rounded-xl font-medium">附加新資料</button>
                <button onclick="closeModal('modal-import')" class="w-full py-4 text-neutral-400 font-medium text-center">取消</button>
            </div>
        </div>
    </div>

    <script>
        // 核心資料與全域變數
        let gear = JSON.parse(localStorage.getItem('ultra_gear') || '[]');
        let categories = JSON.parse(localStorage.getItem('ultra_cats') || '[{"id":"c1","name":"睡眠系統"},{"id":"c2","name":"背負系統"},{"id":"c3","name":"炊具飲食"}]');
        let trips = JSON.parse(localStorage.getItem('ultra_trips') || '[]');
        let plans = JSON.parse(localStorage.getItem('ultra_plans') || '[]');
        
        let activeTab = 'gear', currentView = 'list', editingId = null, tempFormData = {}, tripSortMode = 'date', catSortMode = false;
        let selectedCatId = null, pendingImportFile = null;
        let lastScrollTop = 0;
        
        const COLORS = ["#111111", "#555555", "#888888", "#aaaaaa", "#cccccc", "#eeeeee"];

        // 輔助函式
        const getDateRange = (startDate, days) => {
            if(!startDate) return '未定日期';
            const start = new Date(startDate);
            const end = new Date(start);
            end.setDate(start.getDate() + (parseInt(days)||1) - 1);
            const f = d => `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
            return f(start) === f(end) ? f(start) : `${f(start)} ~ ${f(end)}`;
        };

        const addMinutes = (timeStr, mins) => {
            if(!timeStr) return "--:--";
            let [h, m] = timeStr.split(':').map(Number);
            let d = new Date(); d.setHours(h, m + mins);
            return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        };

        const getTripStats = (data) => {
            const sel = data.selectedGear || {};
            const consumables = data.consumables || [];
            let total = 0, checkedCount = 0;
            const gearTotal = gear.length;
            const cats = {};

            gear.forEach(g => {
                const status = sel[g.id];
                if (status) checkedCount++;
                if (status === 'take') {
                    total += g.weight;
                    const catName = categories.find(c => c.id === g.category)?.name || '未分類';
                    cats[catName] = (cats[catName] || 0) + g.weight;
                }
            });

            let consTotal = 0;
            consumables.forEach(c => { consTotal += (c.weight || 0); });
            if(consTotal > 0) {
                total += consTotal;
                cats['消耗品'] = (cats['消耗品'] || 0) + consTotal;
            }
            return { total, checkedCount, gearTotal, isDone: gearTotal > 0 && checkedCount === gearTotal, pieData: Object.entries(cats).map(([name, value]) => ({ name, value, percent: total > 0 ? value/total : 0 })).sort((a,b) => b.value - a.value) };
        };

        function generatePieSVG(data){
            const radius = 14, circum = 2 * Math.PI * radius;
            let offset = 0;
            return data.map((d, i) => {
                const dash = d.percent * circum;
                const circle = `<circle cx="18" cy="18" r="${radius}" fill="transparent" stroke="${d.name==='消耗品'?'#111111':COLORS[i % COLORS.length]}" stroke-width="8" stroke-dasharray="${dash} ${circum-dash}" stroke-dashoffset="${-offset}" />`;
                offset += dash; return circle;
            }).join('');
        }

        // 渲染邏輯
        function render() {
            const container = document.getElementById('view-container');
            const nav = document.getElementById('bottom-nav');
            
            nav.classList.toggle('hide', currentView !== 'list');
            document.getElementById('nav-gear').className = `flex flex-col items-center gap-1 w-1/3 transition-colors ${activeTab === 'gear' ? 'text-neutral-900' : 'text-neutral-300'}`;
            document.getElementById('nav-plans').className = `flex flex-col items-center gap-1 w-1/3 transition-colors ${activeTab === 'plans' ? 'text-neutral-900' : 'text-neutral-300'}`;
            document.getElementById('nav-trips').className = `flex flex-col items-center gap-1 w-1/3 transition-colors ${activeTab === 'trips' ? 'text-neutral-900' : 'text-neutral-300'}`;
            
            if (currentView === 'list') renderListView(container);
            else if (currentView === 'gear-form') renderGearForm(container);
            else if (currentView === 'cat-manager') renderCatManager(container);
            else if (currentView === 'trip-form') renderTripForm(container);
            else if (currentView === 'plan-form') renderPlanForm(container);
            else if (currentView === 'plan-view') renderPlanView(container);
        }

        function renderListView(container) {
            let html = `<div id="main-list-content" class="h-full overflow-y-auto p-6 pb-32 animate-in no-scrollbar">`;
            if (activeTab === 'gear') {
                html += `<div class="flex justify-between items-center mb-6 relative"><h2 class="text-2xl font-semibold">裝備庫</h2><button onclick="document.getElementById('gear-menu').classList.toggle('hide')" class="text-neutral-400 p-2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button><div id="gear-menu" class="absolute right-0 top-10 w-40 bg-white border rounded-2xl shadow-xl text-sm hide z-50 overflow-hidden"><button onclick="currentView='cat-manager';render()" class="block w-full text-left px-4 py-4 hover:bg-neutral-50">管理分類</button><button onclick="exportCSV()" class="block w-full text-left px-4 py-4 hover:bg-neutral-50 border-t">匯出 CSV</button><button onclick="document.getElementById('csv-input').click()" class="block w-full text-left px-4 py-4 hover:bg-neutral-50 border-t">匯入 CSV</button></div></div>`;
                [...categories, {id:'', name:'未分類'}].forEach(c => {
                    const items = gear.filter(g => (g.category||'') === (c.id||''));
                    if (items.length === 0) return;
                    html += `<h3 class="text-[10px] uppercase tracking-widest text-neutral-400 border-b pb-2 mb-4 mt-8 font-bold">${c.name}</h3>`;
                    items.forEach(i => html += `<div onclick="editGear('${i.id}')" class="flex justify-between items-center py-4 border-b border-neutral-50"><div><div class="text-sm font-medium">${i.name}</div><div class="text-[10px] text-neutral-400">${i.desc||''}</div></div><div class="text-xs font-medium text-neutral-400">${i.weight}g</div></div>`);
                });
            } else if (activeTab === 'plans') {
                html += `<div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-semibold">行程規劃</h2></div>`;
                let sortedPlans = [...plans].sort((a,b) => new Date(a.startDate||0) - new Date(b.startDate||0));
                sortedPlans.forEach(p => {
                    html += `<div onclick="editPlan('${p.id}')" class="p-5 border rounded-2xl shadow-sm bg-white mb-4 active:scale-[0.98] transition-all"><div class="flex justify-between items-start mb-1"><h3 class="font-medium">${p.name}</h3><span class="text-[10px] text-neutral-400 font-mono">${p.days} 天</span></div><span class="text-[10px] text-neutral-400 block mb-4">${getDateRange(p.startDate, p.days)}</span><div class="flex justify-between items-end"><div class="text-xs text-neutral-400">景點數 <b class="text-neutral-800">${(p.dailySchedules||[]).reduce((acc,day)=>acc+(day.spots?.length||0),0)}</b></div><svg class="text-neutral-200" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></div></div>`;
                });
            } else {
                html += `<div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-semibold">行李清單</h2><div class="flex bg-neutral-100 rounded-lg p-1"><button onclick="tripSortMode='date';render()" class="px-3 py-1 text-xs rounded-md ${tripSortMode==='date'?'bg-white shadow':'text-neutral-400'}">日期</button><button onclick="tripSortMode='weight';render()" class="px-3 py-1 text-xs rounded-md ${tripSortMode==='weight'?'bg-white shadow':'text-neutral-400'}">重量</button></div></div>`;
                let sortedTrips = [...trips];
                if(tripSortMode==='date') sortedTrips.sort((a,b)=> new Date(b.startDate||0) - new Date(a.startDate||0));
                else sortedTrips.sort((a,b)=> getTripStats(b).total - getTripStats(a).total);
                sortedTrips.forEach(t => {
                    const s = getTripStats(t);
                    html += `<div onclick="editTrip('${t.id}')" class="p-5 border rounded-2xl shadow-sm bg-white mb-4 active:scale-[0.98] transition-all"><div class="flex justify-between items-start mb-1"><h3 class="font-medium">${t.name}</h3><div class="flex items-center gap-1">${s.isDone ? `<svg class="text-green-500" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>` : ''}<span class="text-[10px] ${s.isDone ? 'text-green-600' : 'text-neutral-400'} font-mono">${s.checkedCount}/${s.gearTotal}</span></div></div><span class="text-[10px] text-neutral-400 block mb-4">${getDateRange(t.startDate, t.days)}</span><div class="flex justify-between items-end"><div class="text-xs text-neutral-400">總重 <b class="text-neutral-800">${(s.total/1000).toFixed(2)}kg</b></div><svg class="text-neutral-200" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></div></div>`;
                });
            }
            html += `<button onclick="addNewItem()" class="fixed bottom-28 right-6 w-14 h-14 bg-neutral-900 text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 z-30"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>`;
            container.innerHTML = html;
        }

        function renderGearForm(container) {
            container.innerHTML = `<div id="gear-form-content" class="p-6 pt-12 animate-in overflow-y-auto h-full no-scrollbar"><button onclick="currentView='list'; render()" class="mb-8 text-neutral-400 flex items-center gap-1"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>返回</button><div class="space-y-6"><div class="space-y-1"><label class="text-[10px] uppercase font-bold text-neutral-400 ml-1">裝備名稱</label><input id="f-name" class="w-full bg-neutral-50 p-4 rounded-2xl outline-none" value="${tempFormData.name||''}"></div><div class="grid grid-cols-2 gap-4"><div><label class="text-[10px] uppercase font-bold text-neutral-400 ml-1">重量 (g)</label><input id="f-weight" type="number" class="w-full bg-neutral-50 p-4 rounded-2xl outline-none" value="${tempFormData.weight||''}"></div><div><label class="text-[10px] uppercase font-bold text-neutral-400 ml-1">分類</label><select id="f-cat" class="w-full bg-neutral-50 p-4 rounded-2xl outline-none">${categories.map(c=>`<option value="${c.id}" ${tempFormData.category===c.id?'selected':''}>${c.name}</option>`).join('')}<option value="" ${!tempFormData.category?'selected':''}>未分類</option></select></div></div><div class="space-y-1"><label class="text-[10px] uppercase font-bold text-neutral-400 ml-1">描述</label><input id="f-desc" class="w-full bg-neutral-50 p-4 rounded-2xl outline-none" value="${tempFormData.desc||''}"></div><button onclick="submitGear()" class="w-full py-4 bg-neutral-900 text-white rounded-2xl font-medium shadow-lg">儲存裝備</button>${editingId?`<button onclick="triggerDelete('gear','${editingId}')" class="w-full py-4 text-red-500 font-medium">刪除</button>`:''}</div><div class="h-20"></div></div>`;
            requestAnimationFrame(() => {
                const el = document.getElementById('gear-form-content');
                if (el) el.scrollTop = lastScrollTop;
            });
        }

        function renderCatManager(container) {
            container.innerHTML = `<div class="p-6 pt-12 flex flex-col h-full animate-in"><button onclick="currentView='list'; selectedCatId=null; render()" class="mb-6 text-neutral-400 flex items-center gap-1 self-start"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>返回</button><div class="flex justify-between items-center mb-6"><h2 class="text-xl font-semibold">分類管理</h2><button onclick="catSortMode=!catSortMode; selectedCatId=null; render()" class="text-[10px] px-4 py-1.5 rounded-full transition-all ${catSortMode?'bg-neutral-900 text-white shadow-lg scale-105':'bg-neutral-100 text-neutral-500'}">${catSortMode ? '完成排序' : '排序'}</button></div><div class="flex-1 overflow-y-auto space-y-3 mb-6 no-scrollbar pr-1">${categories.map(c => `<div onclick="${catSortMode ? `handleCatReorder('${c.id}')` : ''}" class="flex items-center gap-3 bg-white border border-neutral-100 p-4 rounded-2xl shadow-sm transition-all duration-200 ${catSortMode ? 'sorting-active cursor-pointer active:scale-[0.98]' : ''} ${selectedCatId === c.id ? 'selected-for-move' : ''}">${catSortMode ? `<div class="text-neutral-300"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9h14M5 15h14"/></svg></div>` : ''}<input class="flex-1 outline-none text-sm font-medium bg-transparent pointer-events-${catSortMode?'none':'auto'}" value="${c.name}" onchange="updateCatName('${c.id}',this.value)" ${catSortMode ? 'disabled' : ''}>${!catSortMode ? `<button onclick="triggerDelete('category','${c.id}')" class="p-2 text-neutral-300 hover:text-red-500 transition-colors"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>` : ''}</div>`).join('')}</div>${!catSortMode ? `<div class="flex gap-2 pb-10"><input id="new-cat-name" class="flex-1 bg-neutral-50 px-5 py-4 rounded-2xl outline-none text-sm border border-transparent focus:border-neutral-200" placeholder="新分類名稱..."><button onclick="addCat()" class="w-14 h-14 bg-neutral-900 text-white rounded-2xl flex items-center justify-center text-2xl font-light shadow-lg active:scale-95">＋</button></div>` : ''}</div>`;
        }

        function renderTripForm(container) {
            const stats = getTripStats(tempFormData);
            const consumables = tempFormData.consumables || [];
            const consWeight = stats.pieData.find(d => d.name === '消耗品')?.value || 0;
            const gearWeight = stats.total - consWeight;

            container.innerHTML = `<div class="flex flex-col h-full bg-white animate-in">
                <div class="p-4 border-b flex justify-between items-center"><button onclick="currentView='list'; render()" class="text-neutral-400">關閉</button><div class="flex gap-3 items-center">${editingId?`<button onclick="triggerDelete('trip','${editingId}')" class="text-red-500 text-xs">刪除</button>`:''}<button onclick="submitTrip()" class="px-6 py-2 bg-neutral-900 text-white rounded-full text-xs font-medium">儲存</button></div></div>
                <div id="trip-form-content" class="flex-1 overflow-y-auto p-6 no-scrollbar">
                    <input id="t-name" class="text-2xl font-semibold w-full outline-none mb-6 bg-transparent" placeholder="行李清單名稱" value="${tempFormData.name||''}" oninput="tempFormData.name=this.value">
                    <div class="flex gap-4 mb-2">
                        <div class="flex-1"><label class="text-[9px] uppercase font-bold text-neutral-400 mb-1 block">日期</label><input id="t-date" type="date" class="block w-full outline-none text-sm bg-transparent p-0 m-0" value="${tempFormData.startDate||''}" oninput="tempFormData.startDate=this.value"></div>
                        <div class="w-20 border-l border-neutral-100 pl-4"><label class="text-[9px] uppercase font-bold text-neutral-400 mb-1 block">天數</label><input id="t-days" type="number" class="w-full outline-none text-sm bg-transparent" value="${tempFormData.days||1}" oninput="saveCurrentScroll('trip-form-content'); tempFormData.days=this.value; renderTripForm(document.getElementById('view-container'))"></div>
                    </div>
                    <div class="text-[10px] text-neutral-400 mb-8 border-b pb-4 text-left">${getDateRange(tempFormData.startDate, tempFormData.days)}</div>

                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');

                a.download = `${plan.name}.png`;

        function exportCSV() {
            const esc = (v) => `"${String(v||'').replace(/"/g, '""')}"`;
            let rows = ["TYPE,id,name,weight,category,desc,days,startDate,extra1,extra2"];
            categories.forEach(c => rows.push(`CAT,${c.id},${esc(c.name)},,,,,,`));
            gear.forEach(g => rows.push(`GEAR,${g.id},${esc(g.name)},${g.weight},${g.category},${esc(g.desc)},,,`));
            trips.forEach(t => { 
                const sel = JSON.stringify(t.selectedGear || {}); 
                const cons = JSON.stringify(t.consumables || []);
                rows.push(`TRIP,${t.id},${esc(t.name)},,,,${t.days},${t.startDate},${esc(sel)},${esc(cons)}`); 
            });
            plans.forEach(p => {
                const sched = JSON.stringify(p.dailySchedules || []);
                rows.push(`PLAN,${p.id},${esc(p.name)},,,,${p.days},${p.startDate},${esc(sched)},`);
            });
            const b = new Blob(["\ufeff" + rows.join("\n")], { type: "text/csv;charset=utf-8;" });
            const u = URL.createObjectURL(b); const a = document.createElement("a"); a.href = u; a.download = "ultragear_pro_backup.csv"; a.click();
        }

        function parseCSVLine(l) {
            const cols = [];
            let col = '', inQ = false;
            for (let i = 0; i < l.length; i++) {
                const c = l[i], next = l[i+1];
                if (inQ) {
                    if (c === '"' && next === '"') { col += '"'; i++; }
                    else if (c === '"') inQ = false;
                    else col += c;
                } else {
                    if (c === '"') inQ = true;
                    else if (c === ',') { cols.push(col); col = ''; }
                    else col += c;
                }
            }
            cols.push(col);
            return cols;
        }

        function prepareImport(event) { 
            let f = event.target.files[0]; 
            if(f) { 
                pendingImportFile = f; 
                document.getElementById('modal-import').classList.remove('hide'); 
            }
            event.target.value = ''; 
        }

        function handleImportMode(mode) {
            closeModal('modal-import'); if(!pendingImportFile) return;
            const r = new FileReader(); 
            r.onload = function(e) {
                const lines = e.target.result.replace(/^\uFEFF/, '').split(/\r?\n/).slice(1);
                let nG = [], nC = [], nT = [], nP = [];
                lines.forEach(l => {
                    if(!l.trim()) return;
                    const cols = parseCSVLine(l);
                    if(cols[0]==='CAT') nC.push({ id: cols[1], name: cols[2] });
                    if(cols[0]==='GEAR') nG.push({ id: cols[1], name: cols[2], weight: parseFloat(cols[3])||0, category: cols[4], desc: cols[5]||'' });
                    if(cols[0]==='TRIP') { 
                        let sel = {}, cons = [];
                        try { sel = JSON.parse(cols[8]||'{}'); cons = JSON.parse(cols[9]||'[]'); } catch(err) { console.error(err); }
                        nT.push({ id: cols[1], name: cols[2], days: parseInt(cols[6])||1, startDate: cols[7], selectedGear: sel, consumables: cons }); 
                    }
                    if(cols[0]==='PLAN') {
                        let sched = [];
                        try { sched = JSON.parse(cols[8]||'[]'); } catch(err) { console.error(err); }
                        nP.push({ id: cols[1], name: cols[2], days: parseInt(cols[6])||1, startDate: cols[7], dailySchedules: sched });
                    }
                });
                if(mode==='overwrite') { gear = nG; categories = nC.length?nC:categories; trips = nT; plans = nP; }
                else { gear = [...gear,...nG]; nC.forEach(nc => { if(!categories.find(c=>c.id===nc.id)) categories.push(nc); }); trips = [...trips,...nT]; plans = [...plans, ...nP]; }
                saveData(); pendingImportFile = null;
            };
            r.readAsText(pendingImportFile);
        }

        function submitPlan() {
            const planId = editingId || Date.now().toString();
            const planName = (tempFormData.name||'未命名行程').trim();
            const plan = { ...tempFormData, id: planId, name: planName };
            
            if (editingId) plans = plans.map(p => p.id === editingId ? plan : p);
            else plans.unshift(plan);

            const existingTripIdx = trips.findIndex(t => t.id === planId);
            const tripData = {
                id: planId,
                name: planName,
                startDate: plan.startDate,
                days: plan.days,
                selectedGear: existingTripIdx > -1 ? trips[existingTripIdx].selectedGear : {},
                consumables: existingTripIdx > -1 ? trips[existingTripIdx].consumables : []
            };

            if(existingTripIdx > -1) trips[existingTripIdx] = tripData;
            else trips.unshift(tripData);

            currentView = 'list'; saveData();
        }

        function addConsumable() { 
            saveCurrentScroll('trip-form-content');
            const n = document.getElementById('new-cons-name'); 
            const w = document.getElementById('new-cons-weight'); 
            if(!n.value || !w.value) return; 
            if(!tempFormData.consumables) tempFormData.consumables = []; 
            tempFormData.consumables.push({name:n.value, weight:parseFloat(w.value)||0}); 
            renderTripForm(document.getElementById('view-container')); 
        }
        function fastFillCons(name) { 
            document.getElementById('new-cons-name').value = name; 
            document.getElementById('new-cons-weight').focus(); 
        }
        function removeConsumable(idx) { 
            saveCurrentScroll('trip-form-content');
            tempFormData.consumables.splice(idx, 1); 
            renderTripForm(document.getElementById('view-container')); 
        }
        function toggleGearStatus(itemId, status) { 
            saveCurrentScroll('trip-form-content');
            if (!tempFormData.selectedGear) tempFormData.selectedGear = {}; 
            if (tempFormData.selectedGear[itemId] === status) delete tempFormData.selectedGear[itemId]; 
            else tempFormData.selectedGear[itemId] = status; 
            renderTripForm(document.getElementById('view-container')); 
        }

        function updateCatName(id, name) { categories = categories.map(c=>c.id===id?{...c, name:name.trim()}:c); saveData(); }
        function addCat() { const n = document.getElementById('new-cat-name').value.trim(); if (!n) return; categories.push({id:'c'+Date.now(), name:n}); saveData(); }
        
        function submitGear() {
            const id = editingId || Date.now().toString();
            const newGear = {
                id,
                name: document.getElementById('f-name').value.trim(),
                weight: parseFloat(document.getElementById('f-weight').value) || 0,
                category: document.getElementById('f-cat').value,
                desc: document.getElementById('f-desc').value.trim()
            };

            if (editingId) {
                gear = gear.map(g => g.id === editingId ? newGear : g);
            } else {
                gear.unshift(newGear);
            }

            // 只存資料，不呼叫會全域重繪的 saveData
            localStorage.setItem('ultra_gear', JSON.stringify(gear));

            currentView = 'list';
            render();

            // 回到原本捲動位置
            requestAnimationFrame(() => {
                const el = document.getElementById('main-list-content');
                if (el) el.scrollTop = lastScrollTop;
            });
        }
        
        function submitTrip() { const trip = { ...tempFormData, id: editingId || Date.now().toString(), name: (tempFormData.name||'未命名清單').trim() }; if (editingId) trips = trips.map(t => t.id === editingId ? trip : t); else trips.unshift(trip); currentView = 'list'; saveData(); }
        
        function triggerDelete(type, id) { 
            // 刪除 gear 前面加保存
            if (type === 'gear') saveCurrentScroll('main-list-content');

            const btn = document.getElementById('confirm-delete-btn'); 
            const msg = document.getElementById('delete-modal-msg');
            document.getElementById('modal-delete').classList.remove('hide'); 
            
            if (type === 'category') {
                const count = gear.filter(g => g.category === id).length;
                msg.innerText = `目前有 ${count} 筆裝備使用此分類，刪除後將變為無分類。`;
            } else {
                msg.innerText = "此動作無法復原。";
            }

            btn.onclick = function() { 
                if(type === 'gear') gear = gear.filter(g => g.id !== id);
                if(type === 'trip') trips = trips.filter(t => t.id !== id);
                if(type === 'plan') {
                    plans = plans.filter(p => p.id !== id);
                    trips = trips.filter(t => t.id !== id);
                }
                if(type === 'category') {
                    categories = categories.filter(c => c.id !== id);
                    gear = gear.map(g => g.category === id ? {...g, category: ''} : g);
                }
                currentView = 'list';
                closeModal('modal-delete'); 
                saveData(); 

                // 刪除後同樣嘗試恢復位置
                requestAnimationFrame(() => {
                    const el = document.getElementById('main-list-content');
                    if (el) el.scrollTop = lastScrollTop;
                });
            }; 
        }

        function handleCatReorder(id) { if (!selectedCatId) { selectedCatId = id; } else if (selectedCatId === id) { selectedCatId = null; } else { const idx1 = categories.findIndex(c => c.id === selectedCatId); const idx2 = categories.findIndex(c => c.id === id); [categories[idx1], categories[idx2]] = [categories[idx2], categories[idx1]]; selectedCatId = null; saveData(); } render(); }

        render();
    </script>
</body>
</html>
